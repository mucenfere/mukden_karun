<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gazetteer(地名目錄)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f8f8f6; color: #111;
    }

    /* ── Top nav ── */
    .topnav {
      position: fixed; top: 0; left: 0; right: 0; height: 44px;
      display: flex; gap: 48px; align-items: center; padding: 0 80px;
      background: rgba(255,255,255,0.95); z-index: 1000;
      border-bottom: 1px solid #ddd;
    }
    .topnav a { text-decoration: none; color: #111; font-weight: 800; font-size: 16px; }
    .topnav a:hover { text-decoration: underline; }

    body { padding-top: 44px; }
    main { max-width: 1400px; margin: 0 auto; padding: 28px 32px 60px; }
    h1 { font-size: 22px; font-weight: 800; margin: 0 0 6px; }
    .subtitle { color: #666; font-size: 13px; margin-bottom: 24px; }

    /* ── Auth bar ── */
    .auth-bar {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 22px; padding: 10px 14px;
      background: #fff; border: 1px solid #ddd; border-radius: 8px; font-size: 13px;
    }
    .auth-bar input {
      flex: 1; padding: 6px 10px; border: 1px solid #ccc;
      border-radius: 6px; font-size: 13px; font-family: monospace;
    }
    .auth-bar button {
      padding: 6px 14px; border: none; border-radius: 6px;
      cursor: pointer; font-size: 13px; font-weight: 600;
      background: #111; color: #fff;
    }
    .auth-status { font-size: 12px; color: #888; }
    .auth-status.ok   { color: #2a9d2a; }
    .auth-status.fail { color: #c0392b; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; gap: 10px; align-items: center;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .toolbar input[type=search] {
      flex: 1; min-width: 180px; padding: 7px 12px;
      border: 1px solid #ccc; border-radius: 6px; font-size: 13px;
    }
    .btn-add {
      padding: 7px 16px; background: #1a73e8; color: #fff;
      border: none; border-radius: 6px; font-size: 13px;
      font-weight: 600; cursor: pointer; white-space: nowrap;
    }
    .btn-add:disabled { background: #aaa; cursor: default; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%; border-collapse: collapse;
      table-layout: fixed;
      background: #fff; border: 1px solid #e0e0e0;
      border-radius: 8px; overflow: hidden; font-size: 13px;
    }
    thead th {
      background: #f0f0ee; text-align: left;
      padding: 10px 12px; font-weight: 700;
      border-bottom: 1px solid #ddd; white-space: nowrap;
      user-select: none;
      border-right: 1px solid #d8d8d4;
    }
    thead th:last-child { border-right: none; }
    th.sortable { cursor: pointer; }
    th.sortable:hover { background: #e4e4e0; }

    /* 컬럼 너비 */
    col.col-id       { width: 48px;  }
    col.col-hanja    { width: 120px; }
    col.col-manchu   { width: 160px; }
    col.col-time     { width: 110px; }
    col.col-type     { width: 80px;  }
    col.col-desc     { width: auto;  }
    col.col-trust    { width: 80px;  }
    col.col-actions  { width: 90px;  }

    tbody tr { border-bottom: 1px solid #d0d0cc; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafaf8; }
    td { padding: 9px 12px; vertical-align: top; border-right: 1px solid #e0e0dc; }
    td:last-child { border-right: none; }
    .empty-row td { text-align: center; color: #999; padding: 32px; border-right: none; }
    td.seq    { color: #bbb; font-size: 12px; text-align: center; white-space: nowrap; }
    td.hanja  { font-size: 14px; font-weight: 600; word-break: break-word; overflow-wrap: break-word; }
    td.manchu { font-family: monospace; color: #444; word-break: break-word; overflow-wrap: break-word; }
    td.time   { color: #555; white-space: nowrap; }
    td.type   { color: #555; white-space: nowrap; }
    td.desc   { color: #555; word-break: break-word; overflow-wrap: break-word; }
    td.trust  { color: #555; white-space: nowrap; text-align: center; }
    td.actions { white-space: nowrap; }

    .btn-edit, .btn-del {
      padding: 3px 10px; border-radius: 5px; border: none;
      cursor: pointer; font-size: 12px; font-weight: 600; margin-right: 4px;
    }
    .btn-edit { background: #e8f0fe; color: #1a73e8; }
    .btn-edit:hover { background: #c5d8fc; }
    .btn-del  { background: #fce8e6; color: #c0392b; }
    .btn-del:hover  { background: #f5c0bb; }
    

    /* ── Sortable headers ── */
    thead th.sortable { cursor: pointer; user-select: none; white-space: nowrap; }
    thead th.sortable:hover { background: #e4e4e0; }
    thead th .sort-arrow { display: inline-block; margin-left: 5px; color: #aaa; font-size: 11px; }
    thead th.sort-asc .sort-arrow  { color: #111; }
    thead th.sort-desc .sort-arrow { color: #111; }

    /* ── Modal ── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.35); z-index: 2000;
      align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #fff; border-radius: 10px; padding: 24px 28px;
      width: 480px; max-width: calc(100vw - 32px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .modal h2 { margin: 0 0 18px; font-size: 17px; font-weight: 800; }
    .modal label {
      display: block; font-size: 12px; font-weight: 700;
      color: #555; margin-bottom: 4px; margin-top: 12px;
    }
    .modal label:first-of-type { margin-top: 0; }
    .modal input, .modal textarea {
      width: 100%; padding: 7px 10px; border: 1px solid #ccc;
      border-radius: 6px; font-size: 13px; font-family: inherit;
    }
    .modal textarea { height: 80px; resize: vertical; }
    .modal-actions {
      display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;
    }
    .btn-cancel {
      padding: 7px 16px; border: 1px solid #ccc; background: #fff;
      border-radius: 6px; font-size: 13px; cursor: pointer;
    }
    .btn-save {
      padding: 7px 18px; background: #111; color: #fff;
      border: none; border-radius: 6px; font-size: 13px;
      font-weight: 600; cursor: pointer;
    }
    .btn-save:disabled { background: #aaa; cursor: default; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #222; color: #fff; padding: 10px 22px;
      border-radius: 20px; font-size: 13px; opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 3000; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <nav class="topnav">
    <a href="https://mucenfere.github.io/">Home</a>
    <a href="./index.html">Map</a>
    <a href="./gazetteer.html">Gazetteer</a>
    <a href="./reference.html">Reference</a>
    <a href="./lop.html">Work Log</a>
  </nav>

  <main>
    <h1>Gazetteer <span style="font-weight:400;color:#888">地名目錄</span></h1>
    <p class="subtitle">성경 지역 카룬 지명 목록과 위치 비정의 근거 자료.</p>

    <!-- Auth -->
    <div class="auth-bar">
      <span style="white-space:nowrap;font-weight:600;">🔑 편집 모드</span>
      <input type="password" id="tokenInput" placeholder="GitHub Personal Access Token" autocomplete="off" />
      <button id="tokenBtn">확인</button>
      <span id="authStatus" class="auth-status">미인증 — 읽기 전용</span>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <input type="search" id="searchInput" placeholder="한자·만주어·설명 검색…" />
      <button class="btn-add" id="addBtn" disabled>+ 항목 추가</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table id="mainTable">
        <colgroup>
          <col class="col-id">
          <col class="col-hanja">
          <col class="col-manchu">
          <col class="col-time">
          <col class="col-type">
          <col class="col-desc">
          <col class="col-trust">
          <col class="col-actions">
        </colgroup>
        <thead>
          <tr>
            <th class="sortable" data-col="seq" style="text-align:center">No<span class="sort-arrow"> ⇅</span></th>
            <th class="sortable" data-col="hanja">지명_한자<span class="sort-arrow"> ⇅</span></th>
            <th class="sortable" data-col="manchu">지명_만주어<span class="sort-arrow"> ⇅</span></th>
            <th class="sortable" data-col="time">시간 레이어<span class="sort-arrow"> ⇅</span></th>
            <th class="sortable" data-col="type">유형<span class="sort-arrow"> ⇅</span></th>
            <th>위치 고증 관련 자료</th>
            <th class="sortable" data-col="trust" style="text-align:center">신뢰도<span class="sort-arrow"> ⇅</span></th>
            <th id="actionsHeader" style="display:none">작업</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="empty-row"><td colspan="8">불러오는 중…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <h2 id="modalTitle">항목 추가</h2>
      <label>지명_한자 漢字</label>
      <input type="text" id="fHanja" placeholder="예: 鳳凰城" />
      <label>지명_만주어 Manju gisun</label>
      <input type="text" id="fManchu" placeholder="예: Fiyanggu hoton" />
      <label>시간 레이어</label>
      <input type="text" id="fTime" placeholder="예: 강희말기, 건륭중기 등" />
      <label>유형</label>
      <input type="text" id="fType" placeholder="예: 변내카룬, 변외카룬, 邊臺 등" />
      <label>위치 고증 관련 자료</label>
      <textarea id="fDesc" placeholder="위치 비정 근거, 사료 출처, 관련 카룬 등"></textarea>
      <label>신뢰도</label>
      <input type="text" id="fTrust" placeholder="예: 高, 中, 低" />
      <div class="modal-actions">
        <button class="btn-cancel" id="modalCancel">취소</button>
        <button class="btn-save"   id="modalSave">저장</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  (() => {
    const REPO   = 'mucenfere/mukden_karun';
    const PATH   = 'data/mukden_karun_gazetteer.json';
    const BRANCH = 'main';

    let token     = '';
    let entries   = [];
    let fileSha   = '';
    let editingId = null;
    let authed    = false;

    let sortState = { col: null, dir: 'asc' };

    // ── Elements ──
    const tokenInput    = document.getElementById('tokenInput');
    const tokenBtn      = document.getElementById('tokenBtn');
    const authStatus    = document.getElementById('authStatus');
    const addBtn        = document.getElementById('addBtn');
    const searchInput   = document.getElementById('searchInput');
    const tableBody     = document.getElementById('tableBody');
    const actionsHeader = document.getElementById('actionsHeader');
    const modalBackdrop = document.getElementById('modalBackdrop');
    const modalTitle    = document.getElementById('modalTitle');
    const modalCancel   = document.getElementById('modalCancel');
    const modalSave     = document.getElementById('modalSave');
    const fHanja        = document.getElementById('fHanja');
    const fManchu       = document.getElementById('fManchu');
    const fTime         = document.getElementById('fTime');
    const fType         = document.getElementById('fType');
    const fDesc         = document.getElementById('fDesc');
    const fTrust        = document.getElementById('fTrust');
    const toastEl       = document.getElementById('toast');

    // ── Toast ──
    let toastTimer;
    function showToast(msg, duration = 2800) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
    }

    // ── Escape HTML ──
    function esc(s) {
      return String(s || '').replace(/[&<>"']/g, m =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
    }

    // ── GitHub API ──
    function apiHeaders() {
      return {
        'Authorization': `token ${token}`,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github+json'
      };
    }

    async function fetchFile() {
      const rawUrl = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${PATH}?t=${Date.now()}`;
      const res = await fetch(rawUrl);
      if (res.status === 404) { fileSha = ''; return []; }
      if (!res.ok) throw new Error(`데이터 불러오기 실패: ${res.status}`);
      const data = await res.json();
      fetchSha();
      return data;
    }

    async function fetchSha() {
      if (!token) return;
      const url = `https://api.github.com/repos/${REPO}/contents/${PATH}?ref=${BRANCH}`;
      const res = await fetch(url, { headers: apiHeaders() });
      if (res.ok) {
        const data = await res.json();
        fileSha = data.sha;
      }
    }

    async function saveFile(newEntries, commitMsg) {
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(newEntries, null, 2))));
      const body = { message: commitMsg, content, branch: BRANCH };
      if (fileSha) body.sha = fileSha;
      const res = await fetch(
        `https://api.github.com/repos/${REPO}/contents/${PATH}`,
        { method: 'PUT', headers: apiHeaders(), body: JSON.stringify(body) }
      );
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.message || `저장 실패 (${res.status})`);
      }
      const data = await res.json();
      fileSha = data.content.sha;
    }

    // ── Sort & Filter ──
    function getSortedFiltered(filter) {
      const q = filter.trim().toLowerCase();
      const withSeq = entries.map((e, i) => ({ ...e, seq: i + 1 }));
      let list = q
        ? withSeq.filter(e =>
            (e.hanja  || '').toLowerCase().includes(q) ||
            (e.manchu || '').toLowerCase().includes(q) ||
            (e.time   || '').toLowerCase().includes(q) ||
            (e.type   || '').toLowerCase().includes(q) ||
            (e.desc   || '').toLowerCase().includes(q) ||
            (e.trust  || '').toLowerCase().includes(q))
        : [...withSeq];

      if (sortState.col) {
        list.sort((a, b) => {
          if (sortState.col === 'seq') {
            return sortState.dir === 'asc' ? a.seq - b.seq : b.seq - a.seq;
          }
          const va = (a[sortState.col] || '').toLowerCase();
          const vb = (b[sortState.col] || '').toLowerCase();
          return sortState.dir === 'asc'
            ? va.localeCompare(vb, 'ko')
            : vb.localeCompare(va, 'ko');
        });
      }
      return list;
    }

    // ── Render ──
    function renderTable(filter = '') {
      document.querySelectorAll('th.sortable').forEach(th => {
        th.classList.remove('sort-asc', 'sort-desc');
        const arrow = th.querySelector('.sort-arrow');
        if (th.dataset.col === sortState.col) {
          th.classList.add(sortState.dir === 'asc' ? 'sort-asc' : 'sort-desc');
          if (arrow) arrow.textContent = sortState.dir === 'asc' ? ' ↑' : ' ↓';
        } else {
          if (arrow) arrow.textContent = ' ⇅';
        }
      });

      const list = getSortedFiltered(filter);
      if (list.length === 0) {
        const msg = filter.trim() ? '검색 결과 없음' : '항목이 없습니다. 항목을 추가해보세요.';
        tableBody.innerHTML = `<tr class="empty-row"><td colspan="8">${msg}</td></tr>`;
        return;
      }

      tableBody.innerHTML = list.map(e => `
        <tr data-id="${e.id}">
          <td class="seq">${e.seq}</td>
          <td class="hanja">${esc(e.hanja)}</td>
          <td class="manchu">${esc(e.manchu)}</td>
          <td class="time">${esc(e.time)}</td>
          <td class="type">${esc(e.type)}</td>
          <td class="desc">${esc(e.desc)}</td>
          <td class="trust">${esc(e.trust)}</td>
          <td class="actions"${authed ? '' : ' style="display:none"'}>
            <button class="btn-edit" data-id="${e.id}">수정</button>
            <button class="btn-del"  data-id="${e.id}">삭제</button>
          </td>
        </tr>
      `).join('');
    }

    // ── 헤더 클릭 정렬 ──
    document.querySelectorAll('th.sortable').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (sortState.col === col) {
          if (sortState.dir === 'asc')       sortState.dir = 'desc';
          else if (sortState.dir === 'desc') { sortState.col = null; sortState.dir = 'asc'; }
        } else {
          sortState.col = col;
          sortState.dir = 'asc';
        }
        renderTable(searchInput.value);
      });
    });

    // ── Auth ──
    tokenBtn.addEventListener('click', async () => {
      const t = tokenInput.value.trim();
      if (!t) return;
      tokenBtn.disabled = true;
      tokenBtn.textContent = '확인 중…';
      try {
        const res = await fetch('https://api.github.com/user', {
          headers: { 'Authorization': `token ${t}`, 'Accept': 'application/vnd.github+json' }
        });
        if (!res.ok) throw new Error('인증 실패');
        const user = await res.json();
        token  = t;
        authed = true;
        authStatus.textContent = `✓ ${user.login} 로 인증됨`;
        authStatus.className = 'auth-status ok';
        addBtn.disabled = false;
        actionsHeader.style.display = '';
        tokenInput.value = '';
        await fetchSha();
        renderTable(searchInput.value);
        showToast(`${user.login} 로 로그인 완료`);
      } catch {
        authStatus.textContent = '✗ 토큰이 올바르지 않습니다';
        authStatus.className = 'auth-status fail';
      } finally {
        tokenBtn.disabled = false;
        tokenBtn.textContent = '확인';
      }
    });
    tokenInput.addEventListener('keydown', e => { if (e.key === 'Enter') tokenBtn.click(); });

    // ── Search ──
    searchInput.addEventListener('input', () => renderTable(searchInput.value));

    // ── Add ──
    addBtn.addEventListener('click', () => openModal(null));

    // ── Table click ──
    tableBody.addEventListener('click', e => {
      const id = e.target.dataset.id;
      if (!id) return;
      if (e.target.classList.contains('btn-edit')) openModal(id);
      if (e.target.classList.contains('btn-del'))  confirmDelete(id);
    });

    // ── Modal ──
    function openModal(id) {
      editingId = id;
      if (id) {
        const entry = entries.find(e => e.id === id);
        modalTitle.textContent = '항목 수정';
        fHanja.value  = entry.hanja  || '';
        fManchu.value = entry.manchu || '';
        fTime.value   = entry.time   || '';
        fType.value   = entry.type   || '';
        fDesc.value   = entry.desc   || '';
        fTrust.value  = entry.trust  || '';
      } else {
        modalTitle.textContent = '항목 추가';
        fHanja.value = fManchu.value = fTime.value = fType.value = fDesc.value = fTrust.value = '';
      }
      modalBackdrop.classList.add('open');
      fHanja.focus();
    }
    function closeModal() {
      modalBackdrop.classList.remove('open');
      editingId = null;
    }
    modalCancel.addEventListener('click', closeModal);
    modalBackdrop.addEventListener('click', e => { if (e.target === modalBackdrop) closeModal(); });

    modalSave.addEventListener('click', async () => {
      const hanja = fHanja.value.trim();
      if (!hanja) { fHanja.focus(); showToast('지명_한자를 입력해주세요'); return; }
      modalSave.disabled = true;
      modalSave.textContent = '저장 중…';
      try {
        let newEntries;
        if (editingId) {
          newEntries = entries.map(e => e.id === editingId
            ? { ...e, hanja, manchu: fManchu.value.trim(), time: fTime.value.trim(), type: fType.value.trim(), desc: fDesc.value.trim(), trust: fTrust.value.trim() }
            : e);
          await saveFile(newEntries, `gazetteer: update "${hanja}"`);
          entries = newEntries;
          showToast(`"${hanja}" 수정 완료`);
        } else {
          const newEntry = {
            id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
            hanja, manchu: fManchu.value.trim(), time: fTime.value.trim(), type: fType.value.trim(), desc: fDesc.value.trim(), trust: fTrust.value.trim()
          };
          newEntries = [...entries, newEntry];
          await saveFile(newEntries, `gazetteer: add "${hanja}"`);
          entries = newEntries;
          showToast(`"${hanja}" 추가 완료`);
        }
        closeModal();
        renderTable(searchInput.value);
      } catch(err) {
        showToast('⚠ ' + err.message, 4000);
      } finally {
        modalSave.disabled = false;
        modalSave.textContent = '저장';
      }
    });

    // ── Delete ──
    async function confirmDelete(id) {
      const entry = entries.find(e => e.id === id);
      if (!entry) return;
      if (!confirm(`"${entry.hanja}" 을(를) 삭제할까요?`)) return;
      try {
        const newEntries = entries.filter(e => e.id !== id);
        await saveFile(newEntries, `gazetteer: delete "${entry.hanja}"`);
        entries = newEntries;
        renderTable(searchInput.value);
        showToast(`"${entry.hanja}" 삭제 완료`);
      } catch(err) {
        showToast('⚠ ' + err.message, 4000);
      }
    }

    // ── Init ──
    (async () => {
      try {
